services:
  api1: &api
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      NPROBE: ${NPROBE:-8}
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    <<: *api

  nginx:
    image: nginx:alpine
    platform: linux/amd64
    networks:
      - rinha
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

networks:
  rinha:
    driver: bridge
