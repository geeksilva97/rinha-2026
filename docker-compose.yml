services:
  api1: &api
    # Both services share this image name so docker builds once and
    # both containers run off the same image layers → same inode for
    # /data/ivf.bin → kernel shares page cache pages between procs.
    image: rinha-fraud-detection-api:latest
    build:
      context: .
      args:
        CXX_MARCH: ${CXX_MARCH:-haswell}
    platform: linux/amd64
    restart: always
    environment:
      - SOCK=/run/sock/api1.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-100}
    volumes:
      - sock:/run/sock
      # ivf.bin lives inside the image (COPY+gunzip at build).
      # Both containers share the same underlying file via the image layer.
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-100}

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    restart: always
    depends_on:
      - api1
      - api2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

volumes:
  sock:
