name: rinha-fraud-detection

# Image is built and published from the main branch via
# .github/workflows/publish.yml → ghcr.io/geeksilva97/rinha-2026-api
# Pinned by digest for reproducibility on the rinha evaluator.

services:
  api1: &api
    image: ghcr.io/geeksilva97/rinha-2026-api@sha256:4f705f66ddd49c7bbfc486faf3c02bf6c9b0bc0d3d3e1487c1d25a21b8ae2343
    platform: linux/amd64
    restart: always
    environment:
      - SOCK=/run/sock/api1.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=70
    volumes:
      - sock:/run/sock
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=70

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    restart: always
    depends_on:
      - api1
      - api2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

volumes:
  sock:
