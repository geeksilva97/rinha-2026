services:
  api1: &api
    build: .
    platform: linux/amd64
    restart: always
    environment:
      - SOCK=/run/sock/api1.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-100}
    volumes:
      - sock:/run/sock
      # Same ivf.bin in both containers → same inode on the host
      # → kernel shares page cache pages (single RAM region for both procs).
      - ./native/ivf.bin:/data/ivf.bin:ro
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-100}

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    restart: always
    depends_on:
      - api1
      - api2
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

volumes:
  sock:
