services:
  api1: &api
    # Both services share this image name so docker builds once and
    # both containers run off the same image layers → same inode for
    # /data/ivf.bin → kernel shares page cache pages between procs.
    image: rinha-fraud-detection-api:latest
    build:
      context: .
      args:
        CXX_MARCH: ${CXX_MARCH:-haswell}
    platform: linux/amd64
    restart: always
    environment:
      - SOCK=/run/sock/api1.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-70}
      - WARMUP=${WARMUP:-10}
      - RACK_MAX_THREADS=${RACK_MAX_THREADS:-4}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - ACCEPTORS=${ACCEPTORS:-2}
    volumes:
      - sock:/run/sock
      # ivf.bin lives inside the image (COPY+gunzip at build).
      # Both containers share the same underlying file via the image layer.
    # Socket only appears after Puma's bind(), which runs AFTER the
    # synchronous warmup at top-level of app.rb finishes. So socket
    # existence == warmup complete.
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sock/api1.sock"]
      interval: 1s
      timeout: 1s
      retries: 120
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=${NPROBE:-70}
      - WARMUP=${WARMUP:-10}
      - RACK_MAX_THREADS=${RACK_MAX_THREADS:-4}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-1}
      - ACCEPTORS=${ACCEPTORS:-2}
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sock/api2.sock"]
      interval: 1s
      timeout: 1s
      retries: 120
      start_period: 5s

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    restart: always
    depends_on:
      api1: { condition: service_healthy }
      api2: { condition: service_healthy }
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

volumes:
  sock:
