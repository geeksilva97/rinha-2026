name: stress

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  rinha-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: cpu info (sanity — we expect AVX2)
        run: |
          uname -m
          lscpu | grep -E 'Model name|Flags' | head -2 | grep -oE 'avx2|avx512f' | sort -u || echo "(no AVX2/AVX512 flags found)"

      - name: install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: fetch test-data.json + official rinha scripts
        run: |
          mkdir -p stress/test
          curl -sSL -o stress/test/test.js          https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/test/test.js
          curl -sSL -o stress/test/k6-summary.js    https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/test/k6-summary.js
          curl -sSL -o stress/test/test-data.json   https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/test/test-data.json
          mkdir -p stress/test/test
          ls -lh stress/test/

      - name: docker compose up (native amd64, no QEMU)
        run: |
          docker compose up -d --build
          # wait for /ready to return 200
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9999/ready || true)
            if [ "$code" = "200" ]; then break; fi
            sleep 1
          done
          curl -s -o /dev/null -w 'ready=%{http_code}\n' http://localhost:9999/ready

      - name: rinha test (k6, 120s ramping to 900 RPS)
        run: |
          cd stress/test
          k6 run test.js

      - name: print results.json
        if: always()
        run: cat stress/test/test/results.json

      - name: upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rinha-results
          path: stress/test/test/results.json

      - name: container logs (on failure)
        if: failure()
        run: docker compose logs --tail=200

      - name: docker compose down
        if: always()
        run: docker compose down --volumes --remove-orphans
