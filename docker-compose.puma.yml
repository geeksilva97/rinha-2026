name: rinha-fraud-detection

# Image is built and published from the main branch via
# .github/workflows/publish.yml → ghcr.io/geeksilva97/rinha-2026-api
# Pinned by digest for reproducibility on the rinha evaluator.

services:
  api1: &api
    image: ghcr.io/geeksilva97/rinha-2026-api@sha256:914abadd0b1e86b801d071b699223ae4d68ea00c67f1155f9a31400b90e4345b
    platform: linux/amd64
    restart: always
    environment:
      - SOCK=/run/sock/api1.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=70
      - WARMUP=10
    volumes:
      - sock:/run/sock
    # Socket only appears after Puma's bind(), which runs AFTER the
    # synchronous warmup at the top of app.rb finishes. So socket
    # existence == warmup complete == container ready to serve.
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sock/api1.sock"]
      interval: 1s
      timeout: 1s
      retries: 120
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "160M"

  api2:
    <<: *api
    environment:
      - SOCK=/run/sock/api2.sock
      - IVF_PATH=/data/ivf.bin
      - NPROBE=70
      - WARMUP=10
    healthcheck:
      test: ["CMD-SHELL", "test -S /run/sock/api2.sock"]
      interval: 1s
      timeout: 1s
      retries: 120
      start_period: 5s

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    restart: always
    depends_on:
      api1: { condition: service_healthy }
      api2: { condition: service_healthy }
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30M"

volumes:
  sock:
