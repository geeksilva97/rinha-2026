# Override: replace Puma with the Ractor-per-request server.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.ractor.yml up ...
services:
  api1:
    command: ["bundle", "exec", "ruby", "-W0", "/app/server_ractor.rb"]
    volumes:
      - sock:/run/sock
      - ./server_ractor.rb:/app/server_ractor.rb:ro
  api2:
    command: ["bundle", "exec", "ruby", "-W0", "/app/server_ractor.rb"]
    volumes:
      - sock:/run/sock
      - ./server_ractor.rb:/app/server_ractor.rb:ro
