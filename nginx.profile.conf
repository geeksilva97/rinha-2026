# Profiling variant of nginx.conf: enables access_log with detailed timings
# Pull this in instead of nginx.conf to capture per-request profile data.
worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    error_log /dev/stderr crit;

    # Profiling log: msec=request-completion-time, request_time=total at LB,
    # upstream_response_time=time spent waiting on backend (queue + compute),
    # upstream_connect_time=just the upstream connect.
    log_format prof '$msec $request_time $upstream_response_time $upstream_connect_time';
    access_log /var/log/nginx/access.log prof buffer=64k flush=1s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100000;

    upstream api {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
        keepalive 64;
    }

    server {
        listen 9999 default_server backlog=4096;
        server_name _;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
