worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr crit;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 100000;

    upstream api {
        server unix:/run/sock/api1.sock;
        server unix:/run/sock/api2.sock;
        keepalive 64;
    }

    server {
        listen 9999 default_server backlog=4096;
        server_name _;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }
}
