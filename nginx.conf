worker_processes 1;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  access_log off;
  error_log /dev/stderr warn;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  upstream apis {
    server api1:9999;
    server api2:9999;
    keepalive 16;
  }

  server {
    listen 9999 backlog=1024;

    location / {
      proxy_pass http://apis;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
    }
  }
}
